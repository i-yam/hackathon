services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data_clean:/app/data_clean:ro
      - ./models:/app/models:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

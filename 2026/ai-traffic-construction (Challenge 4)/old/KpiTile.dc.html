<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>
<div style="box-sizing:border-box; width:100%; height:100%; background:#ffffff; border:1px solid #e3e7eb; border-radius:11px; padding:14px 16px; font-family:'IBM Plex Sans',Helvetica,Arial,sans-serif;">
  <div style="font-size:24px; font-weight:700; color:{{ valueColor }}; line-height:1; font-variant-numeric:tabular-nums;">{{ value }}</div>
  <div style="font-size:12px; color:#6b727a; margin-top:8px; line-height:1.25;">{{ label }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:92},&quot;value&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;3.150&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;\u00d8 Verkehr Kfz/h&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;neutral&quot;,&quot;options&quot;:[&quot;neutral&quot;,&quot;good&quot;,&quot;warn&quot;,&quot;bad&quot;],&quot;tsType&quot;:&quot;'neutral' | 'good' | 'warn' | 'bad'&quot;}}">
class Component extends DCLogic {
  TONE = { neutral:'#14181c', good:'#15803d', warn:'#a66a00', bad:'#b42318' };
  renderVals(){
    const tone = this.props.tone ?? 'neutral';
    return {
      value: this.props.value ?? '–',
      label: this.props.label ?? '',
      valueColor: this.TONE[tone] ?? this.TONE.neutral
    };
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</helmet>
<div onClick="{{ onSelect }}" style="{{ cardStyle }}">
  <div style="font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; color:{{ rankColor }}; width:30px; flex:0 0 auto;">{{ rank }}</div>
  <div style="flex:1; min-width:0;">
    <div style="font-size:17px; font-weight:600; color:#14181c; line-height:1.15;">{{ period }}</div>
    <div style="font-family:'IBM Plex Mono',monospace; font-size:12px; color:#858d95; margin-top:2px; font-variant-numeric:tabular-nums;">{{ dates }}</div>
  </div>
  <div style="font-size:10px; color:#9aa0a6; text-transform:uppercase; letter-spacing:.7px; flex:0 0 auto;">Eignung</div>
  <div style="{{ scoreStyle }}">{{ score }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:520,&quot;height&quot;:74},&quot;rank&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#1&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;period&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;KW 32/26 – KW 35/26&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;dates&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;03.08.26 – 30.08.26&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;score&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:78,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:0,&quot;max&quot;:100},&quot;active&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;scoreBg&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#e7f4ec&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;scoreFg&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#15803d&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;scoreBorder&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#bfe3cb&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onSelect&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const active = !!this.props.active;
    const bg = this.props.scoreBg ?? '#e7f4ec';
    const fg = this.props.scoreFg ?? '#15803d';
    const bd = this.props.scoreBorder ?? '#bfe3cb';
    return {
      rank: this.props.rank ?? '#1',
      period: this.props.period ?? '–',
      dates: this.props.dates ?? '',
      score: this.props.score ?? 0,
      onSelect: this.props.onSelect ?? (() => {}),
      rankColor: active ? '#1f5da6' : '#aeb4ba',
      cardStyle: { boxSizing:'border-box', width:'100%', cursor:'pointer', display:'flex', alignItems:'center', gap:'14px',
        padding:'13px 16px', borderRadius:'11px', fontFamily:"'IBM Plex Sans',Helvetica,Arial,sans-serif",
        background: active ? '#ffffff' : '#fbfbfc',
        border: active ? '1.5px solid #1f5da6' : '1px solid #e3e7eb',
        boxShadow: active ? '0 1px 3px rgba(31,93,166,.16)' : 'none',
        transition:'background .12s ease, border-color .12s ease' },
      scoreStyle: { flex:'0 0 auto', width:'46px', height:'46px', borderRadius:'10px', display:'flex',
        alignItems:'center', justifyContent:'center', fontSize:'19px', fontWeight:'700',
        fontVariantNumeric:'tabular-nums', background:bg, color:fg, border:'1px solid '+bd }
    };
  }
}
</script>
</body>
</html>

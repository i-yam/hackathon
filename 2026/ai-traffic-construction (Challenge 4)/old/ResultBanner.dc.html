<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</helmet>
<div style="display:flex; align-items:center; gap:26px; width:100%; box-sizing:border-box; background:#ffffff; border:1px solid #dfe3e7; border-left:5px solid {{ accent }}; border-radius:14px; padding:20px 24px; box-shadow:0 1px 3px rgba(16,24,40,.06); font-family:'IBM Plex Sans',Helvetica,Arial,sans-serif;">
  <div style="position:relative; flex:0 0 auto; width:90px; height:90px;">
    <div style="{{ ringStyle }}"></div>
    <div style="position:absolute; inset:8px; background:#fff; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center;">
      <div style="font-size:30px; font-weight:700; line-height:1; color:{{ fg }}; font-variant-numeric:tabular-nums;">{{ score }}</div>
      <div style="font-family:'IBM Plex Mono',monospace; font-size:10px; color:#9aa0a6; margin-top:1px;">/ 100</div>
    </div>
  </div>
  <div style="flex:1; min-width:0;">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:7px;">
      <span style="font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:1.4px; color:#fff; background:{{ accent }}; padding:3px 9px; border-radius:5px;">{{ tag }}</span>
      <span style="font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.4px; color:#858d95;">{{ sectionName }}</span>
    </div>
    <div style="font-size:29px; font-weight:600; line-height:1.12; color:#14181c; letter-spacing:-.3px;">{{ period }}</div>
    <div style="font-size:16px; color:#515860; margin-top:3px; font-variant-numeric:tabular-nums;">{{ dates }}</div>
  </div>
  <div style="flex:0 0 auto; display:flex; flex-direction:column; align-items:flex-end; gap:11px;">
    <div style="display:flex; align-items:center; gap:7px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#858d95;"><span style="width:8px; height:8px; border-radius:50%; background:{{ accent }};"></span>{{ filterLabel }}</div>
    <div onClick="{{ onReserve }}" role="button" style="cursor:pointer; background:#1f5da6; color:#fff; font-size:15px; font-weight:600; padding:11px 22px; border-radius:9px; box-shadow:0 1px 2px rgba(16,24,40,.18);" style-hover="background:#184c87;">{{ ctaLabel }}</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:134},&quot;score&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:78,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:0,&quot;max&quot;:100},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1f9d57&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;fg&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#15803d&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tag&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;OPTIMALER ZEITRAUM&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;sectionName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Hanau — Aschaffenburg&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;period&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;KW 32/26 – KW 35/26&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;dates&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;03.08.26 – 30.08.26&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;filterLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Filter: Geringster Verkehrseinfluss&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;ctaLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Fenster reservieren&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onReserve&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const score = this.props.score ?? 0;
    const accent = this.props.accent ?? '#1f9d57';
    const fg = this.props.fg ?? '#15803d';
    const deg = Math.round(Math.max(0, Math.min(100, score)) * 3.6);
    return {
      score, accent, fg,
      tag: this.props.tag ?? 'OPTIMALER ZEITRAUM',
      sectionName: this.props.sectionName ?? '',
      period: this.props.period ?? '–',
      dates: this.props.dates ?? '',
      filterLabel: this.props.filterLabel ?? '',
      ctaLabel: this.props.ctaLabel ?? 'Fenster reservieren',
      onReserve: this.props.onReserve ?? (() => {}),
      ringStyle: { width:'100%', height:'100%', borderRadius:'50%',
        background:`conic-gradient(${accent} ${deg}deg, #e9ecef 0deg)` }
    };
  }
}
</script>
</body>
</html>
